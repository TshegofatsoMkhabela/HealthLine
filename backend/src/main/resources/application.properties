spring.application.name=healthline-backend

# Supabase Postgres connection (ADR-0). Values come from environment variables,
# never hardcoded here. Render's dashboard sets these per-service.
#
# DatabaseUrlEnvironmentPostProcessor normalizes DATABASE_URL (postgres://user:pass@host/db,
# Supabase's native format) into a jdbc: URL before these placeholders are ever resolved, and
# takes priority over the plain bindings below whenever it runs — the bindings here only apply
# if DATABASE_URL is entirely unset, which shouldn't happen in any real deploy.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# Actuator's HealthEndpoint bean (DB-connectivity check included) backs both /actuator/health
# (Actuator's own default route, aggregate status only for anonymous callers thanks to
# show-details=when-authorized below) and HealthController's plain /health at the site root,
# which Render's health check hits directly.
#
# base-path is deliberately left at its Spring Boot default (/actuator), not set to "/" — the
# original approach here set base-path=/ to get a literal /health, but that's global: it would
# expose every future actuator endpoint (metrics, info, ...) at the site root too, not just
# health. Two failed attempts before this one, verified empirically rather than assumed:
#   1. management.endpoints.web.path-mapping only renames an endpoint WITHIN /actuator, it
#      cannot move one to the site root — /health still 404'd, /actuator/health stayed the
#      real route.
#   2. management.endpoints.web.exposure.exclude=* (meant to close Actuator's web surface
#      entirely, letting a plain controller own /health) instead prevented the HealthEndpoint
#      bean from being created at all — bean creation is conditional on being exposed via SOME
#      technology, so the app failed to boot.
# The actual fix: leave exposure.include at its default (health only, confined under
# /actuator/health), and let HealthController separately own /health at the root. Both routes
# now legitimately coexist, neither is a namespace risk, and the bean is created because health
# stays exposed under /actuator.
management.endpoint.health.show-details=when-authorized

server.port=${PORT:8080}

# ai-service's own base URL — two independent Render services, per ADR-0's two-service split.
# A failed/slow call here must never block dispatch; DispatchService falls back to a safe
# generic summary rather than leaving a dispatch stuck PENDING (see DispatchService).
ai-service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}
