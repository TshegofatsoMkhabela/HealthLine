# Combined with the "test" profile to simulate "DB was reachable at boot, goes down after the
# app is already running" — points at a port nothing listens on, with Hikari's startup
# validation, Hibernate's dialect auto-detection, its schema validation, and Flyway's migration
# all disabled, since each of those independently opens a connection at boot and would fail
# context startup here instead of letting the actuator health check's live attempt fail.
spring.datasource.url=jdbc:postgresql://127.0.0.1:1/unreachable
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
